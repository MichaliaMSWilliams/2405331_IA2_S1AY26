<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register - Party R U</title>
    <link rel="stylesheet" href="../Styles/L&Rstyle.css">
</head>
<body>
    <section id="Welcome">
        <img src="Blue_Sky_Party_Decor.png" alt="Blue Sky" width="500" height="400">
    </section>
    <div class="registration-container">
        <h1>Register</h1>
        <label for="FirstName">First Name:</label>
        <input type="text" id="FirstName" required>

        <label for="LastName">Last Name:</label>
        <input type="text" id="LastName" required>

        <label for="email">Email:</label>
        <input type="email" id="email" required>

        <label for="password">Password:</label>
        <input type="password" id="password">

        <br><br>
        <button type="button" id="registerBtn">Register & Save</button>
        <p>Already have an account? </p>
        <a href="index.html" class="back-btn">Login</a>
    </div>

    <script>
        document.getElementById('registerBtn').addEventListener('click', function() {
            const userDetails = {
                firstName: document.getElementById('FirstName').value,
                lastName: document.getElementById('LastName').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            if (userDetails.firstName && userDetails.email && userDetails.password) {
                localStorage.setItem('registeredUser', JSON.stringify(userDetails));
                alert("Account created! Redirecting to login...");
                window.location.href = "index.html"; 
            } else {
                alert("Please fill in all fields.");
            }
        });
    </script>
</body>
</html>
