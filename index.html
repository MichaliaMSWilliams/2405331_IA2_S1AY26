<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Blue Sky Party Decor Login</title>
    <link rel="stylesheet" href="../Styles/L&Rstyle.css">
</head>
<body>
    <section id="Welcome">
        <h1>WELCOME TO:</h1>
        <img src="Blue_Sky_Party_Decor.png" alt="Blue Sky" width="500" height="400">
    </section>
    <div class="login-container">
        <h1>Login</h1>
        <label for="email">Email:</label>
        <input type="email" id="email" required>

        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Enter your password" required>

        <button id="loginBtn">Login</button>
        <p>Don't have an account? <a href="Registration.html">Register here</a></p>
    </div>

    <script>
        document.getElementById('loginBtn').addEventListener('click', function() {
            // 1. Get what the user typed right now
            const emailInput = document.getElementById('email').value;
            const passInput = document.getElementById('password').value;

            // 2. Get the saved data
            const savedData = localStorage.getItem('registeredUser');

            if (savedData) {
                const user = JSON.parse(savedData);

                // 3. Compare them
                if (emailInput === user.email && passInput === user.password) {
                    alert("Login Successful! Welcome, " + user.firstName);
                    window.location.href = "Products.html";
                } else {
                    alert("Invalid email or password.");
                }
            } else {
                alert("No account found. Please register first.");
            }
        });
    </script>
</body>
</html>
